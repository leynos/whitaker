name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.2.1) — must match an existing tag"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-installer:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57

      - name: Add target
        run: rustup target add "${{ matrix.target }}"

      - name: Read version from Cargo.toml
        id: version
        run: |
          version=$(cargo metadata --manifest-path installer/Cargo.toml \
            --no-deps --format-version 1 | \
            jq -r '.packages[] | select(.name == "whitaker-installer") | .version')
          if [[ -z "$version" ]]; then
            echo "::error::Failed to extract version from Cargo.toml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build installer binary
        run: |
          cargo build -p whitaker-installer --release --target "${{ matrix.target }}"

      - name: Build packaging tool
        run: |
          cargo build --release -p whitaker-installer --bin whitaker-package-installer

      - name: Determine binary path
        id: binary
        run: |
          set -euxo pipefail
          TARGET="${{ matrix.target }}"
          if [[ "$TARGET" == *windows* ]]; then
            BIN="target/${TARGET}/release/whitaker-installer.exe"
          else
            BIN="target/${TARGET}/release/whitaker-installer"
          fi
          echo "path=$BIN" >> "$GITHUB_OUTPUT"

      - name: Package archive
        run: |
          set -euxo pipefail
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            PACKAGER="./target/release/whitaker-package-installer.exe"
          else
            PACKAGER="./target/release/whitaker-package-installer"
          fi
          "$PACKAGER" \
            --crate-version "${{ steps.version.outputs.version }}" \
            --target "${{ matrix.target }}" \
            --binary-path "${{ steps.binary.outputs.path }}" \
            --output-dir dist

      - name: Generate SHA-256 checksum
        run: |
          set -euxo pipefail
          python scripts/generate_checksums.py dist/

      - name: Diagnostics (package archive)
        if: failure()
        run: |
          set -euxo pipefail
          ls -lah "target/${{ matrix.target }}/release" || true
          ls -lah dist || true

      - name: Upload artefact
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.target }}
          path: dist/*
          retention-days: 5

  build-dependency-binaries:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57

      - name: Add target
        run: rustup target add "${{ matrix.target }}"

      # The dependency tools' locked dependencies can require a newer rustc
      # than the repository's pinned nightly (cargo-dylint 6.0.1 locks
      # cargo-util 0.2.28, which needs rustc 1.93), so host-tool installs run
      # under a current stable toolchain.
      - name: Install stable toolchain for host tools
        run: |
          set -euxo pipefail
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add --toolchain stable "${{ matrix.target }}"

      - name: Build dependency packaging tool
        run: cargo build --release -p whitaker-installer --bin whitaker-package-dependency-binary

      - name: Build and package dependency binaries
        run: |
          set -euxo pipefail
          mkdir -p dist
          mkdir -p dependency-root
          python installer/scripts/dependency_binaries_manifest.py > /tmp/dependency-binaries.tsv
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            PACKAGER="./target/release/whitaker-package-dependency-binary.exe"
          else
            PACKAGER="./target/release/whitaker-package-dependency-binary"
          fi
          while IFS=$'\t' read -r package binary version; do
            cargo +stable install \
              --locked \
              --force \
              --root dependency-root \
              --target "${{ matrix.target }}" \
              --version "$version" \
              "$package"
            if [[ "${{ matrix.target }}" == *windows* ]]; then
              executable="dependency-root/bin/${binary}.exe"
            else
              executable="dependency-root/bin/${binary}"
            fi
            "$PACKAGER" package \
              --package "$package" \
              --target "${{ matrix.target }}" \
              --binary-path "$executable" \
              --output-dir dist
          done < /tmp/dependency-binaries.tsv

      - name: Generate SHA-256 checksums
        run: |
          set -euxo pipefail
          python scripts/generate_checksums.py dist/

      - name: Diagnostics (dependency binaries)
        if: failure()
        run: |
          set -euxo pipefail
          ls -lah dependency-root/bin || true
          ls -lah dist || true

      - name: Upload dependency artefact
        uses: actions/upload-artifact@v7
        with:
          name: dependency-binaries-${{ matrix.target }}
          path: |
            dist/*.tgz
            dist/*.zip
            dist/*.sha256
          retention-days: 5

  publish:
    # Publish whatever the build legs produced instead of discarding the
    # successful legs when one fails: !cancelled() keeps this job running
    # after a failed need, and the artefact downloads below tolerate absent
    # legs. The job still fails when nothing at all was built.
    if: ${{ !cancelled() && (github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')) }}
    needs:
      - build-installer
      - build-dependency-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57

      - name: Build dependency packaging tool
        run: cargo build --release -p whitaker-installer --bin whitaker-package-dependency-binary

      - name: Verify tag matches Cargo.toml version
        run: |
          set -euxo pipefail
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "::error::Tag '$RELEASE_TAG' must start with 'v' (e.g. v0.2.1)"
            exit 1
          fi
          CARGO_VERSION=$(cargo metadata --manifest-path installer/Cargo.toml \
            --no-deps --format-version 1 | \
            jq -r '.packages[] | select(.name == "whitaker-installer") | .version')
          if [[ -z "$CARGO_VERSION" ]]; then
            echo "::error::Failed to extract version from Cargo.toml"
            exit 1
          fi
          TAG="${RELEASE_TAG#v}"
          if [[ "$TAG" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version ($TAG) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Download all artefacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: installer-*
          merge-multiple: true
          path: dist

      - name: Download dependency artefacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: dependency-binaries-*
          merge-multiple: true
          path: dist

      - name: Require at least one build archive
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(dist/*.tgz dist/*.zip)
          if [[ "${#archives[@]}" -eq 0 ]]; then
            echo "::error::No build archives were produced; refusing to publish an empty release."
            exit 1
          fi

      - name: Generate dependency provenance asset
        run: |
          set -euxo pipefail
          ./target/release/whitaker-package-dependency-binary provenance --output-dir dist

      - name: List artefacts
        run: |
          set -euo pipefail
          if [[ ! -d dist ]]; then
            echo "No artefacts were downloaded."
            exit 1
          fi
          ls -lh dist/
          shopt -s nullglob
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu \
            x86_64-apple-darwin aarch64-apple-darwin x86_64-pc-windows-msvc; do
            matches=(dist/*"${target}"*)
            if [[ "${#matches[@]}" -eq 0 ]]; then
              echo "::warning::No artefacts for ${target}; publishing without it."
            fi
          done

      - name: Create GitHub Release
        run: |
          set -euxo pipefail
          TAG="${RELEASE_TAG}"
          shopt -s nullglob
          # Archive patterns must be kept in sync with ARCHIVE_PATTERNS
          # in scripts/generate_checksums.py
          ASSETS=(dist/*.tgz dist/*.zip dist/*.sha256 dist/*.md)
          if [[ "${#ASSETS[@]}" -eq 0 ]]; then
            echo "No release assets found."
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, uploading assets."
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" \
              --title "Release ${TAG}" \
              --generate-notes \
              --verify-tag \
              "${ASSETS[@]}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          set -euxo pipefail
          cargo publish -p whitaker-common
          cargo publish -p whitaker-installer
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
