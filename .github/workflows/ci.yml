name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_PROFILE: debug
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
# CodeScene coverage: main-branch coverage is uploaded by
# coverage-main.yml on push. The pull-request changed-line gate
# (`cs-coverage check`, mode: check) is intentionally omitted here: the
# CodeScene project (71836) does not yet have a coverage gates
# configuration, so `mode: check` would fail every run. Add a guarded
# coverage job with `fetch-depth: 0` and `upload-codescene-coverage`
# (mode: check) once CodeScene enables the gate for this project.
jobs:
  linux-full:
    runs-on: ubicloud-standard-4-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Verus FragmentId bridge
        run: scripts/check-verus-fragment-id-bridge.sh

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@d3cbe87e745e07b3ad53ddcb87deb19ffa95c9b8

      - name: Install cargo-nextest
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: nextest@0.9.114

      - name: Check formatting
        run: make check-fmt

      - name: Install bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2
        with:
          bun-version: '1.2.21'

      - name: Install Mermaid CLI
        run: |
          set -euxo pipefail
          bun install --no-progress --global @mermaid-js/mermaid-cli@11.9.0
          bun x @puppeteer/browsers browsers install chrome-headless-shell
          mmdc --version

      - name: Setup uv
        uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d  # v7.1.0
        with:
          version: 'latest'

      - name: Install Nixie
        run: uv tool install "nixie-cli==1.0.0"

      - name: Nixie
        run: make nixie

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23.2.0
        with:
          globs: '**/*.md'

      - name: Lint
        run: make lint

      - name: Workflow contract tests
        run: make test-workflow-contracts

      - name: Publish dry run
        run: make publish-check PUBLISH_PACKAGES="whitaker-common whitaker-installer"

  windows-compat:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@d3cbe87e745e07b3ad53ddcb87deb19ffa95c9b8

      - name: Install cargo-nextest
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: nextest@0.9.114

      - name: Test
        run: make test NEXTEST_PROFILE=ci

      - name: Installer smoke test
        run: make install-smoke

      - name: Installer release dry run
        run: make release-installer-dry-run

      - name: Show sccache stats
        if: ${{ always() }}
        run: sccache --show-stats || true
