name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_PROFILE: debug
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  linux-full:
    runs-on: ubicloud-standard-4-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@c749ab3a96026e14051a2198bf75f94650581b75

      - name: Install cargo-nextest
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: nextest@0.9.114

      - name: Check formatting
        run: make check-fmt

      - name: Install bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2
        with:
          bun-version: '1.2.21'

      - name: Install Mermaid CLI
        run: |
          set -euxo pipefail
          bun install --no-progress --global @mermaid-js/mermaid-cli@11.9.0
          bun x @puppeteer/browsers browsers install chrome-headless-shell
          mmdc --version

      - name: Setup uv
        uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d  # v7.1.0
        with:
          version: 'latest'

      - name: Install Nixie
        run: uv tool install --from git+https://github.com/leynos/nixie nixie

      - name: Nixie
        run: make nixie

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e  # v20
        with:
          globs: '**/*.md'

      - name: Lint
        run: make lint

      - name: Publish dry run
        run: make publish-check

  windows-compat:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@c749ab3a96026e14051a2198bf75f94650581b75

      - name: Install cargo-nextest
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: nextest@0.9.114

      - name: Test
        run: make test NEXTEST_PROFILE=ci

      - name: Installer release dry run
        run: make release-installer-dry-run

      - name: Show sccache stats
        if: ${{ always() }}
        run: sccache --show-stats || true
