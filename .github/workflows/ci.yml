name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_PROFILE: debug
  CARGO_INCREMENTAL: 0
  CARGO_LOCKED: --locked
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
# CodeScene coverage: main-branch coverage is uploaded by
# coverage-main.yml on push. The pull-request changed-line gate runs in
# the coverage-check job below via `mode: check` against the same
# `make coverage` lcov.info that coverage-main.yml generates.
jobs:
  coverage-check:
    if: github.event_name == 'pull_request'
    runs-on: ubicloud-standard-4-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57

      - name: Install cargo-nextest
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: nextest@0.9.114

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: cargo-llvm-cov@0.6.24

      - name: Generate coverage
        run: make coverage

      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: github.event_name == 'pull_request' && env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/71836
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

  linux-full:
    runs-on: ubicloud-standard-4-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check Verus FragmentId bridge
        run: scripts/check-verus-fragment-id-bridge.sh

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57

      - name: Install cargo-nextest
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: nextest@0.9.114

      - name: Check formatting
        run: make check-fmt

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: '1.2.21'

      - name: Install Mermaid CLI
        run: |
          set -euxo pipefail
          bun install --no-progress --global @mermaid-js/mermaid-cli@11.9.0
          bun x @puppeteer/browsers browsers install chrome-headless-shell
          mmdc --version

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: 'latest'

      - name: Setup Rust for Merman
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # master
        with:
          toolchain: '1.95.0'

      - name: Install Merman CLI
        run: cargo +1.95.0 install merman-cli --version "=0.7.0" --locked

      - name: Install Nixie
        run: uv tool install --python 3.14 "nixie-cli==1.1.0"

      - name: Enforce en-GB-oxendict spelling
        run: make spelling

      - name: Nixie
        run: make nixie

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25  # v24.0.0
        with:
          globs: |
            **/*.md
            !**/.uv-cache/**
            !**/.uv-tools/**

      - name: Lint
        run: make lint

      - name: Workflow contract tests
        run: make test-workflow-contracts

      - name: Publish dry run
        run: make publish-check PUBLISH_PACKAGES="whitaker-common whitaker-installer"

  windows-compat:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57

      - name: Install cargo-nextest
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: nextest@0.9.114

      - name: Test
        run: make test NEXTEST_PROFILE=ci

      - name: Installer smoke test
        run: make install-smoke

      - name: Installer release dry run
        run: make release-installer-dry-run

      - name: Show sccache stats
        if: ${{ always() }}
        run: sccache --show-stats || true
