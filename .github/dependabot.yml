version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for Cargo
  - package-ecosystem: "cargo"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cargo"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for workflow test tooling (pip)
  - package-ecosystem: "pip"
    directory: "/tests/workflows"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14
